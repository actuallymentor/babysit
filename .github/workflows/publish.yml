name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -e 'console.log(require("./package.json").version)')" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check
        run: |
          if git tag -l "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "New version: v${{ steps.version.outputs.version }}"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - bun-linux-x64
          - bun-linux-arm64
          - bun-darwin-x64
          - bun-darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lockb', '**/package-lock.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          OS_ARCH="${{ matrix.target }}"
          OS_ARCH="${OS_ARCH#bun-}"
          bun build --compile --target="${{ matrix.target }}" --minify ./src/index.js --outfile "dist/babysit-${OS_ARCH}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: babysit-${{ matrix.target }}
          path: dist/babysit-*

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum babysit-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/babysit-*
            dist/checksums.txt
